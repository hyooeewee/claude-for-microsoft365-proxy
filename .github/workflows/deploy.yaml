name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve GATEWAY_URL
        id: gateway
        run: |
          if [ -n "${{ vars.GATEWAY_URL }}" ]; then
            URL="${{ vars.GATEWAY_URL }}"
          elif [ -n "${{ vars.CUSTOM_DOMAIN }}" ]; then
            URL="https://${{ vars.CUSTOM_DOMAIN }}"
          else
            SUBDOMAIN=$(curl -s -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/workers/subdomain" | \
              jq -r '.result.subdomain')
            NAME=$(grep '^name' wrangler.toml | sed 's/name *= *"\(.*\)"/\1/')
            URL="https://${NAME}.${SUBDOMAIN}.workers.dev"
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Resolved GATEWAY_URL: $URL"

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --var TARGET_BASE=${{ vars.TARGET_BASE }} --var GATEWAY_URL=${{ steps.gateway.outputs.url }}${{ vars.KNOWN_MODELS != '' && format(' --var KNOWN_MODELS={0}', vars.KNOWN_MODELS) || '' }}${{ vars.DEFAULT_MODEL != '' && format(' --var DEFAULT_MODEL={0}', vars.DEFAULT_MODEL) || '' }}${{ vars.CUSTOM_DOMAIN != '' && format(' --domain {0}', vars.CUSTOM_DOMAIN) || '' }}

      - name: Save GATEWAY_URL to Variables
        if: ${{ vars.GATEWAY_URL == '' }}
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/variables/GATEWAY_URL" \
            -d "{\"name\":\"GATEWAY_URL\",\"value\":\"${{ steps.gateway.outputs.url }}\"}"
          echo "GATEWAY_URL saved to repository variables."
