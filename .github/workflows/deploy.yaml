name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --var 'TARGET_BASE:${{ vars.TARGET_BASE }}'${{ vars.ALLOWED_ORIGIN != '' && format(" --var 'ALLOWED_ORIGIN:{0}'", vars.ALLOWED_ORIGIN) || '' }}${{ vars.KNOWN_MODELS != '' && format(" --var 'KNOWN_MODELS:{0}'", vars.KNOWN_MODELS) || '' }}${{ vars.DEFAULT_MODEL != '' && format(" --var 'DEFAULT_MODEL:{0}'", vars.DEFAULT_MODEL) || '' }}${{ vars.GATEWAY_URL != '' && format(' --route {0}', vars.GATEWAY_URL) || '' }}
