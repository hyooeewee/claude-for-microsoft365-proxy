name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main, preview]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers
        run: |
          args=()
          [ -n "$TARGET_BASE" ] && args+=("--var" "TARGET_BASE:${TARGET_BASE}")
          [ -n "$ALLOWED_ORIGIN" ] && args+=("--var" "ALLOWED_ORIGIN:${ALLOWED_ORIGIN}")
          [ -n "$KNOWN_MODELS" ] && args+=("--var" "KNOWN_MODELS:${KNOWN_MODELS}")
          [ -n "$DEFAULT_MODEL" ] && args+=("--var" "DEFAULT_MODEL:${DEFAULT_MODEL}")

          if [ "${{ github.ref_name }}" = "main" ]; then
            [ -n "$GATEWAY_URL" ] && args+=("--domain" "$GATEWAY_URL")
            npx wrangler deploy "${args[@]}"
          else
            npx wrangler versions upload --preview-alias "${{ github.ref_name }}" "${args[@]}"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TARGET_BASE: ${{ vars.TARGET_BASE }}
          ALLOWED_ORIGIN: ${{ vars.ALLOWED_ORIGIN }}
          KNOWN_MODELS: ${{ vars.KNOWN_MODELS }}
          DEFAULT_MODEL: ${{ vars.DEFAULT_MODEL }}
          GATEWAY_URL: ${{ vars.GATEWAY_URL }}
